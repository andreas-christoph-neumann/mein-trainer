<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Svenska Trainer Pro (Cloud, Levels & Voice)</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root {
            --primary: #0051a8;
            --accent: #ffcd00;
            --grammar: #7f8c8d;
            --bg: #f4f4f4;
            --card-bg: #ffffff;
            --text: #333333;
            --input-border: #dddddd;
            --control-bg: #ffffff;
            --list-item-bg: #ffffff;
            --list-border: #eeeeee;
            --edit-bg: #fffde7;
        }

        body.dark-mode {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --input-border: #333333;
            --control-bg: #1e1e1e;
            --list-item-bg: #1e1e1e;
            --list-border: #2c2c2c;
            --edit-bg: #2d2a16;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; transition: background 0.3s, color 0.3s; }
        header { background: var(--primary); color: white; padding: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        #app { flex: 1; display: flex; flex-direction: column; padding: 1rem; overflow-y: auto; }
        
        .score-display { font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 10px; }
        .level-badge { background: var(--accent); color: #000; font-weight: bold; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; min-width: 40px; text-align: center; }

        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 1rem; transition: background 0.3s; }
        .word-prompt { font-size: 1.8rem; font-weight: bold; color: var(--text); margin-bottom: 5px; line-height: 1.2; word-break: break-word; }
        
        .badge-container { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; color: white; font-weight: bold; text-transform: uppercase; }
        .bg-grammar { background-color: var(--grammar); }
        
        .controls { padding: 1rem; background: var(--control-bg); border-top: 1px solid var(--input-border); transition: background 0.3s; }
        .helper-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .helper-btn { padding: 8px 12px; font-size: 1rem; border: 1px solid var(--input-border); border-radius: 5px; background: var(--bg); color: var(--text); }
        
        input { width: 100%; padding: 10px; font-size: 1rem; border: 2px solid var(--input-border); border-radius: 8px; box-sizing: border-box; margin-bottom: 5px; background: var(--bg); color: var(--text); }
        .action-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        .next-btn { background: #4caf50; margin-top: 0; }
        .hidden { display: none; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--card-bg); color: var(--text); padding: 1.5rem; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; }
        
        #vocab-list .vocab-item { border-bottom: 1px solid var(--list-border); padding: 10px; background: var(--list-item-bg); margin-bottom: 5px; border-radius: 5px; }
        .sync-section { background: var(--accent); color: #333; padding: 1rem; border-radius: 10px; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body class="light-mode">

<header>
    <div style="display:flex; align-items:center;">
        <button id="theme-toggle" onclick="toggleTheme()" title="Farbschema umschalten" style="background:none; border:none; color:white; font-size:1.4rem; cursor:pointer;">🌙</button>
        <div class="score-display">
            <span id="level-label" class="level-badge">-</span>
            <span id="score-label">0 Pkt.</span>
        </div>
    </div>
    <button onclick="toggleView()" id="viewBtn" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Verwalten</button>
</header>

<div id="app">
    <div id="learn-view">
        <div id="stats" style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 10px; text-align: center;">Fällig: 0 | Gesamt: 0</div>
        <div class="card">
            <div id="direction-label" style="font-size: 0.9rem; color: var(--primary); margin-bottom: 8px; font-weight: bold;"></div>
            <div class="word-prompt" id="display-prompt">Lade Vokabeln...</div>
            <div id="display-badges" class="badge-container"></div>
            <div id="feedback-area" style="margin-top: 15px; font-weight: bold; min-height: 1.5em; line-height: 1.6;"></div>
        </div>
    </div>

    <div id="add-view" class="hidden">
        <div class="sync-section">
            <strong style="display:block; margin-bottom:5px;">☁️ GitHub Cloud-Sync</strong>
            <input type="password" id="github-token" placeholder="GitHub Personal Access Token" style="margin-bottom:10px;">
            <button class="action-btn" style="background:var(--primary);" onclick="syncFromGist()">Jetzt Synchronisieren (Import)</button>
        </div>

        <h3>Vokabeln verwalten</h3>
        <input type="text" id="input-sv" placeholder="Schwedisch">
        <input type="text" id="input-de" placeholder="Deutsch">
        <input type="text" id="input-tags" placeholder="Zusatzinfo (z.B. II, schw.)">
        <button class="action-btn" onclick="addVocab()">Speichern</button>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="action-btn" style="background:#666; font-size: 0.8rem;" onclick="exportData()">Backup Export</button>
            <button class="action-btn" style="background:#666; font-size: 0.8rem;" onclick="document.getElementById('importFile').click()">Backup Import</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
        </div>
        
        <button class="action-btn" style="background:#d35400; font-size: 0.8rem; margin-top: 10px;" onclick="customConfirm('Alle Daten wirklich löschen?', () => db.items.clear().then(loadNextItem))">Alles löschen</button>

        <h3 style="margin-top:25px">Vokabelliste</h3>
        <input type="text" id="search-input" placeholder="Suchen..." oninput="renderList()">
        <div id="vocab-list"></div>
    </div>
</div>

<div class="controls" id="input-controls">
    <div class="helper-bar">
        <button class="helper-btn" onclick="addChar('å')">å</button>
        <button class="helper-btn" onclick="addChar('ä')">ä</button>
        <button class="helper-btn" onclick="addChar('ö')">ö</button>
    </div>
    <input type="text" id="user-input" placeholder="Deine Antwort..." autocomplete="off">
    <button class="action-btn" id="check-btn" onclick="checkAnswer()">Prüfen</button>
    <button class="action-btn next-btn hidden" id="next-btn" onclick="loadNextItem()">Weiter</button>
</div>

<script>
    const GIST_RAW_URL = 'https://gist.githubusercontent.com/andreas-christoph-neumann/89c2d3c10a13278890ef930003865fe7/raw/e171f296823b075b1319a3d711bda964202b3dfc/vokabeln.json';
    const GIST_ID = '89c2d3c10a13278890ef930003865fe7';

    const db = new Dexie('VocabTrainerDB');
    db.version(1).stores({ items: '++id, termSource, termTarget, direction, tags, srs.dueDate' });

    let currentItem = null;
    let inlineEditingId = null;

    // --- PUNKTE & LEVEL LOGIK ---

    function getLevel(points) {
        const thresholds = [
            { name: "Beginner", min: 0, max: 5000 },
            { name: "A1", min: 5000, max: 10000 },
            { name: "A2", min: 10000, max: 20000 },
            { name: "B1", min: 20000, max: 40000 },
            { name: "B2", min: 40000, max: 80000 },
            { name: "C1", min: 80000, max: 160000 },
            { name: "C2", min: 160000, max: Infinity }
        ];

        for (let i = 0; i < thresholds.length; i++) {
            let t = thresholds[i];
            if (points >= t.min && points < t.max) {
                if (t.name === "C2") return "C2";
                let range = t.max - t.min;
                let step = range / 10;
                let subLevel = Math.floor((points - t.min) / step);
                return `${t.name}.${subLevel}`;
            }
        }
        return "C2";
    }

    async function updateScoreDisplay() {
        const allItems = await db.items.toArray();
        const totalScore = allItems.reduce((sum, item) => {
            const stage = (item.srs && item.srs.stage) ? item.srs.stage : 1;
            return sum + Math.min(stage - 1, 5);
        }, 0);

        document.getElementById('score-label').innerText = `${totalScore.toLocaleString()} Pkt.`;
        document.getElementById('level-label').innerText = getLevel(totalScore);
    }

    // --- SPRACHAUSGABE ---

    function speak(text) {
        if (!text) return;
        const ut = new SpeechSynthesisUtterance(text.split('/')[0]);
        ut.lang = 'sv-SE'; ut.rate = 0.9;
        window.speechSynthesis.speak(ut);
    }

    // --- CLOUD SYNC ---

    async function syncFromGist() {
        const tokenInput = document.getElementById('github-token').value;
        if(tokenInput) localStorage.setItem('github_token', tokenInput);
        try {
            document.getElementById('display-prompt').innerText = "Synchronisiere...";
            const response = await fetch(GIST_RAW_URL + '?t=' + Date.now());
            const data = await response.json();
            if (data && Array.isArray(data)) {
                await db.items.clear();
                await db.items.bulkAdd(data);
                alert("Synchronisation abgeschlossen!");
                location.reload();
            }
        } catch (err) { alert("Sync-Fehler."); loadNextItem(); }
    }

    async function pushToGist() {
        const token = localStorage.getItem('github_token');
        if (!token) return;
        const allItems = await db.items.toArray();
        try {
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { 'vokabeln.json': { content: JSON.stringify(allItems, null, 2) } } })
            });
        } catch (err) { console.error("Cloud Save Error"); }
    }

    // --- TRAINER LOGIK ---

    async function loadNextItem() {
        updateScoreDisplay();
        document.getElementById('check-btn').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('check-btn').disabled = false;
        document.getElementById('user-input').value = ""; 
        document.getElementById('feedback-area').innerText = "";
        
        const due = await db.items.where('srs.dueDate').below(Date.now()).toArray();
        const allCount = await db.items.count();
        document.getElementById('stats').innerText = `Fällig: ${due.length} | Gesamt: ${allCount}`;
        
        currentItem = due.length > 0 ? due[Math.floor(Math.random() * due.length)] : null;
        if (currentItem) {
            const promptEl = document.getElementById('display-prompt');
            promptEl.innerText = currentItem.termSource;
            document.getElementById('display-badges').innerHTML = (currentItem.tags || "").split(',').map(t => `<span class="badge bg-grammar">${t.trim()}</span>`).join('');
            document.getElementById('direction-label').innerHTML = getProgressIcon(currentItem.srs.stage) + (currentItem.direction === 'de-sv' ? " DE ➔ SV" : " SV ➔ DE");
        } else {
            document.getElementById('display-prompt').innerText = allCount > 0 ? "Pause! 🎉" : "Bitte Cloud-Sync nutzen!";
            document.getElementById('display-badges').innerHTML = "";
            document.getElementById('direction-label').innerHTML = "";
        }
    }

    async function checkAnswer() {
        if (!currentItem) return;
        const rawInput = document.getElementById('user-input').value;
        const input = cleanString(rawInput).toLowerCase();
        const targets = currentItem.termTarget.split('/').map(t => cleanString(t));
        const allPossibleVariants = [];
        
        targets.forEach(t => {
            const withParens = cleanString(t.replace(/[()]/g, '')).toLowerCase();
            const withoutParens = cleanString(t.replace(/\([^)]*\)/g, '')).toLowerCase();
            allPossibleVariants.push(withParens);
            if (withoutParens !== withParens) allPossibleVariants.push(withoutParens);
        });

        const isCorrect = allPossibleVariants.includes(input);
        const newSrs = calculateSRS(currentItem, isCorrect);
        await db.items.update(currentItem.id, { srs: newSrs });
        
        pushToGist();
        
        // Sprachausgabe bei Prüfung
        if (currentItem.direction === 'de-sv') speak(currentItem.termTarget); else speak(currentItem.termSource);

        const feedback = document.getElementById('feedback-area');
        if (isCorrect) {
            feedback.innerHTML = `<span style="color: #4caf50;">Richtig! +${Math.min(newSrs.stage - 1, 5)} Pkt.</span>`;
            document.getElementById('check-btn').disabled = true; 
            setTimeout(loadNextItem, 1500);
        } else {
            feedback.innerHTML = `<span style="color: #ff4444;">Falsch. (Reset auf 0 Pkt.)</span><br><small>Lösung: ${currentItem.termTarget}</small>`;
            document.getElementById('check-btn').classList.add('hidden'); 
            document.getElementById('next-btn').classList.remove('hidden');
        }
    }

    function calculateSRS(item, correct) {
        let currentStage = (item.srs && item.srs.stage) ? item.srs.stage : 1;
        if (!correct) return { stage: 1, dueDate: 0 };
        let nextStage = currentStage + 1;
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        let msToAdd = (nextStage === 2) ? rand(20, 50) * 3600000 : 
                      (nextStage === 3) ? rand(5, 10) * 86400000 :
                      (nextStage === 4) ? rand(12, 16) * 86400000 :
                      rand(30, 180) * 86400000;
        return { stage: nextStage, dueDate: Date.now() + msToAdd };
    }

    // --- HELPER ---

    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('theme-toggle').innerText = '☀️'; }
        const savedToken = localStorage.getItem('github_token');
        if(savedToken) document.getElementById('github-token').value = savedToken;
    }

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-toggle').innerText = isDark ? '☀️' : '🌙';
    }

    function cleanString(str) { return str ? str.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim() : ""; }

    function getProgressIcon(stage = 1) {
        const colors = ['#ff4444', '#ff9800', '#ffeb3b', '#90EE90', '#006400'];
        const count = Math.min(Math.max(stage - 1, 0), 5);
        let svg = `<svg width="16" height="8" viewBox="0 0 7.5 4" style="margin-right:6px">`;
        for (let i = 0; i < 5; i++) svg += `<rect x="${i*1.5}" y="${4-(i+1)*0.8}" width="1" height="${(i+1)*0.8}" fill="${i<count ? colors[i] : '#444'}" />`;
        return svg + `</svg>`;
    }

    async function addVocab() {
        const sv = cleanString(document.getElementById('input-sv').value);
        const de = cleanString(document.getElementById('input-de').value);
        if (!sv || !de) return;
        await db.items.bulkAdd([
            { termSource: de, termTarget: sv, direction: 'de-sv', tags: document.getElementById('input-tags').value, srs: { stage: 1, dueDate: 0 } },
            { termSource: sv, termTarget: de, direction: 'sv-de', tags: document.getElementById('input-tags').value, srs: { stage: 1, dueDate: 0 } }
        ]);
        document.getElementById('input-sv').value = ""; document.getElementById('input-de').value = "";
        pushToGist(); renderList(); loadNextItem();
    }

    async function renderList() {
        const items = await db.items.toArray();
        document.getElementById('vocab-list').innerHTML = items.map(i => `
            <div class="vocab-item" style="display:flex; justify-content:space-between">
                <div><strong>${i.termSource}</strong><br><small>${i.termTarget}</small></div>
                <div style="font-size:0.8rem">${Math.min((i.srs.stage || 1)-1, 5)} Pkt.</div>
            </div>`).join('');
    }

    function customConfirm(msg, fn) { if(confirm(msg)) fn(); }
    function addChar(c) { const i = document.getElementById('user-input'); i.value += c; i.focus(); }
    function toggleView() { 
        const isHidden = document.getElementById('add-view').classList.toggle('hidden'); 
        document.getElementById('learn-view').classList.toggle('hidden'); 
        document.getElementById('input-controls').classList.toggle('hidden'); 
        document.getElementById('viewBtn').innerText = isHidden ? "Verwalten" : "Lernen";
        renderList(); 
    }

    initTheme();
    db.items.count().then(c => { if(c === 0 && localStorage.getItem('github_token')) syncFromGist(); else loadNextItem(); });
</script>
</body>
</html>
