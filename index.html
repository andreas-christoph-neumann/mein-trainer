<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Svenska Trainer Pro</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 10'><rect width='16' height='10' fill='%230051a8'/><path d='M5 0v10M0 4h16' stroke='%23ffcd00' stroke-width='2'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 10'><rect width='16' height='10' fill='%230051a8'/><path d='M5 0v10M0 4h16' stroke='%23ffcd00' stroke-width='2'/></svg>">
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root {
            --primary: #0051a8; --accent: #ffcd00; --grammar: #7f8c8d;
            --bg: #f4f4f4; --card-bg: #ffffff; --text: #333333;
            --input-border: #dddddd; --control-bg: #ffffff;
            --list-item-bg: #ffffff; --list-border: #eeeeee;
            --edit-bg: #fffde7; --success: #4caf50; --error: #f44336;
        }
        body.dark-mode {
            --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0;
            --input-border: #333333; --control-bg: #1e1e1e;
            --list-item-bg: #1e1e1e; --list-border: #2c2c2c; --edit-bg: #2d2a16;
        }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; transition: background 0.3s; }
        header { background: var(--primary); color: white; padding: 0.6rem 1rem; display: flex; justify-content: space-between; align-items: center; gap: 8px; z-index: 10; }
        body.keyboard-open header, body.keyboard-open #stats-summary { display: none !important; }
        #app { flex: 1; display: flex; flex-direction: column; padding: 1rem; overflow-y: auto; }
        .score-display { font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
        .level-badge { background: var(--accent); color: #000; font-weight: bold; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
        .header-icons { display: flex; align-items: center; gap: 8px; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 4px; color: white; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        #sync-status-icon.no-token { opacity: 0.3; }
        #sync-status-icon.syncing { animation: pulse 0.8s infinite; color: var(--accent); opacity: 1; }
        #sync-status-icon.success { color: var(--success); opacity: 1; }
        #sync-status-icon.error { color: var(--error); opacity: 1; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--card-bg); color: var(--text); padding: 1.5rem; border-radius: 15px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .filter-option { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--list-border); cursor: pointer; }
        .card { background: var(--card-bg); padding: 1rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 1rem; }
        .word-prompt { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; line-height: 1.2; word-break: break-word; }
        .badge-container { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
        .badge { padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; color: white; font-weight: bold; text-transform: uppercase; }
        .bg-grammar { background-color: var(--grammar); }
        .controls { padding: 0.8rem 1rem; background: var(--control-bg); border-top: 1px solid var(--input-border); }
        input { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid var(--input-border); border-radius: 8px; box-sizing: border-box; margin-bottom: 8px; background: var(--bg); color: var(--text); }
        .action-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        .next-btn { background: #4caf50; }
        .hidden { display: none; }
        .err-char { color: #ff4444; text-decoration: underline; font-weight: bold; }
        .err-missing { color: #ff4444; font-weight: bold; }
        .err-extra { color: #ff4444; text-decoration: line-through; opacity: 0.7; }
        #vocab-list .vocab-item { border-bottom: 1px solid var(--list-border); padding: 10px; background: var(--list-item-bg); margin-bottom: 5px; border-radius: 5px; }
        .inline-edit-box { display: flex; flex-direction: column; gap: 5px; background: var(--edit-bg) !important; padding: 10px; border: 1px solid var(--accent); border-radius: 8px; }
        .list-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 5px; color: var(--text); }
        .sync-section { background: var(--accent); color: #333; padding: 1rem; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body class="light-mode">

<header id="main-header">
    <div style="display:flex; align-items:center; gap: 8px;">
        <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Farbschema" style="font-size:1.4rem;">🌙</button>
        <div class="score-display"><span id="level-label" class="level-badge">-</span><span id="score-label">0</span></div>
    </div>
    <div class="header-icons">
        <div id="sync-status-icon" class="icon-btn no-token" title="Sync-Status"><svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3z"/></svg></div>
        <button id="filter-btn" class="icon-btn" onclick="openFilterModal()" title="Filter"><svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg></button>
        <button onclick="toggleView()" id="viewBtn" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; font-size: 0.85rem;">Verwalten</button>
    </div>
</header>

<div id="filter-modal" class="modal-overlay hidden">
    <div class="modal-box"><h3 style="margin-top:0">Labels filtern</h3><p style="font-size:0.8rem; opacity:0.7">Nichts wählen = Alle anzeigen.</p><div id="filter-options-container"></div><button class="action-btn" style="margin-top:20px" onclick="closeFilterModal()">Fertig</button></div>
</div>

<div id="app">
    <div id="learn-view">
        <div id="stats-summary" style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 10px; text-align: center;">Fällig: 0 | Gesamt: 0</div>
        <div class="card">
            <div id="direction-label" style="font-size: 0.9rem; color: var(--primary); margin-bottom: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center;"></div>
            <div class="word-prompt" id="display-prompt">Lade...</div><div id="display-badges" class="badge-container"></div><div id="feedback-area" style="margin-top: 15px; font-weight: bold; min-height: 1.5em; line-height: 1.6;"></div>
        </div>
    </div>
    <div id="add-view" class="hidden">
        <div class="sync-section"><strong>☁️ GitHub Cloud-Sync</strong><input type="password" id="github-token" placeholder="GitHub Token" style="margin-bottom:10px;" oninput="checkTokenState()"><button class="action-btn" onclick="syncFromGist()">Jetzt Synchronisieren (Import)</button></div>
        <h3>Vokabeln verwalten</h3><input type="text" id="input-sv" placeholder="Schwedisch"><input type="text" id="input-de" placeholder="Deutsch"><input type="text" id="input-tags" placeholder="Tags (z.B. II, schw.)"><button class="action-btn" onclick="addVocab()">Speichern</button>
        <div style="display: flex; gap: 10px; margin-top: 20px;"><button class="action-btn" style="background:#666; font-size: 0.8rem;" onclick="exportData()">Backup Export</button><button class="action-btn" style="background:#666; font-size: 0.8rem;" onclick="document.getElementById('importFile').click()">Backup Import</button><input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)"></div>
        <h3 style="margin-top:25px">Vokabelliste</h3><input type="text" id="search-input" placeholder="Suchen..." oninput="renderList()"><div id="vocab-list"></div>
    </div>
</div>

<div class="controls" id="input-controls">
    <input type="text" id="user-input" placeholder="Deine Antwort..." autocomplete="off" autocapitalize="off" spellcheck="false" data-lpignore="true">
    <button class="action-btn" id="check-btn" onclick="checkAnswer()">Prüfen</button>
    <button class="action-btn next-btn hidden" id="next-btn" onclick="loadNextItem()">Weiter</button>
</div>

<script>
    const GIST_ID = '4f39aa6d600e11901ec96c7aa4a1c99a'; 

    const db = new Dexie('VocabTrainerDB');
    db.version(1).stores({ items: '++id, termSource, termTarget, direction, tags, srs.dueDate' });

    let currentItem = null, inlineEditingId = null, activeFilters = [];

    const inputField = document.getElementById('user-input');
    inputField.addEventListener('focus', () => document.body.classList.add('keyboard-open'));
    inputField.addEventListener('blur', () => document.body.classList.remove('keyboard-open'));

    // === NEU: Sicherheitsfunktion gegen XSS ===
    // Macht Sonderzeichen in Nutzerdaten unschädlich, bevor sie als HTML angezeigt werden.
    function esc(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function cleanString(str) { if (!str) return ""; return str.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').replace(/\s+([?.!,])/g, '$1').trim(); }
    
    function setSyncStatus(status) { 
        const icon = document.getElementById('sync-status-icon'); icon.className = 'icon-btn ' + status; 
        if (status === 'success') setTimeout(() => { if (icon.classList.contains('success')) checkTokenState(); }, 3000); 
    }
    function checkTokenState() { const t = localStorage.getItem('github_token') || document.getElementById('github-token').value; document.getElementById('sync-status-icon').className = t ? 'icon-btn' : 'icon-btn no-token'; }

    // === GEÄNDERT: Filter-Modal nutzt jetzt sichere DOM-Erstellung statt innerHTML ===
    async function openFilterModal() {
        const all = await db.items.toArray();
        const tags = new Set();
        all.forEach(i => { if(i.tags) i.tags.split(',').forEach(t => tags.add(t.trim())); });
        const container = document.getElementById('filter-options-container');
        container.innerHTML = '';
        Array.from(tags).sort().forEach(tag => {
            const label = document.createElement('label');
            label.className = 'filter-option';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = activeFilters.includes(tag);
            cb.addEventListener('change', () => toggleFilterTag(tag));
            const span = document.createElement('span');
            span.textContent = tag;
            label.appendChild(cb);
            label.appendChild(span);
            container.appendChild(label);
        });
        document.getElementById('filter-modal').classList.remove('hidden');
    }
    function toggleFilterTag(t) { activeFilters = activeFilters.includes(t) ? activeFilters.filter(x => x !== t) : [...activeFilters, t]; const btn = document.getElementById('filter-btn'); if (activeFilters.length > 0) btn.classList.add('active'); else btn.classList.remove('active'); }
    function closeFilterModal() { document.getElementById('filter-modal').classList.add('hidden'); loadNextItem(); }

    function getLevel(pts) {
        const th = [{n:"Beginner",min:0,max:5000},{n:"A1",min:5000,max:10000},{n:"A2",min:10000,max:20000},{n:"B1",min:20000,max:40000},{n:"B2",min:40000,max:80000},{n:"C1",min:80000,max:160000},{n:"C2",min:160000,max:Infinity}];
        for (let t of th) { if (pts>=t.min && pts<t.max) { if(t.n==="C2") return "C2"; return `${t.n}.${Math.floor((pts-t.min)/((t.max-t.min)/10))}`; } } return "C2";
    }

    async function updateScoreDisplay() {
        const all = await db.items.toArray(); const pts = all.reduce((s, i) => s + Math.min((i.srs?.stage || 1)-1, 5), 0);
        document.getElementById('score-label').innerText = pts.toLocaleString(); document.getElementById('level-label').innerText = getLevel(pts);
        let target = activeFilters.length > 0 ? all.filter(i => i.tags && activeFilters.some(f => i.tags.split(',').map(x=>x.trim()).includes(f))) : all;
        const now = Date.now(); document.getElementById('stats-summary').innerText = `Fällig: ${target.filter(i=>(i.srs?.dueDate||0)<now).length} | Gesamt: ${target.length}`;
    }

    function speak(t) { if(!t) return; window.speechSynthesis.cancel(); const ut = new SpeechSynthesisUtterance(t.split('/')[0]); ut.lang='sv-SE'; ut.rate=0.9; window.speechSynthesis.speak(ut); }

    // === GEÄNDERT: Einzelne Zeichen werden jetzt mit esc() geschützt ===
    function getDiffHtml(i, t) {
        let r="", x=0, y=0; const s1=i.toLowerCase(), s2=t.toLowerCase();
        while(x<s1.length || y<s2.length) {
            if(x<s1.length && y<s2.length && s1[x]===s2[y]) { r+=esc(i[x]); x++; y++; }
            else if(x<s1.length && y<s2.length && s1[x]!==s2[y]) { if(s1[x+1]===s2[y]) { r+=`<span class="err-extra">${esc(i[x])}</span>`; x++; } else if(s1[x]===s2[y+1]) { r+=`<span class="err-missing">_</span>`; y++; } else { r+=`<span class="err-char">${esc(i[x])}</span>`; x++; y++; } }
            else if(x<s1.length) { r+=`<span class="err-extra">${esc(i[x])}</span>`; x++; } else if(y<s2.length) { r+=`<span class="err-missing">_</span>`; y++; }
        } return r;
    }
    function getLevenshtein(a,b){const m=Array.from({length:a.length+1},()=>[]);for(let i=0;i<=a.length;i++)m[i][0]=i;for(let j=0;j<=b.length;j++)m[0][j]=j;for(let i=1;i<=a.length;i++){for(let j=1;j<=b.length;j++){const c=a[i-1]===b[j-1]?0:1;m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+c)}}return m[a.length][b.length]}

    // === GEÄNDERT: Feedback-Texte nutzen jetzt esc() für Vokabeldaten ===
    async function checkAnswer() {
        if(!currentItem) return; const raw=document.getElementById('user-input').value; const inp=cleanString(raw).toLowerCase();
        const targets=currentItem.termTarget.split('/').map(t=>t.trim()), variants=[];
        targets.forEach(t=>{ variants.push(cleanString(t.replace(/[()]/g,'')).toLowerCase()); let c=cleanString(t.replace(/\([^)]*\)/g,'')).toLowerCase(); if(c&&!variants.includes(c)) variants.push(c); });
        const isCorrect=variants.includes(inp), curPts=Math.min((currentItem.srs?.stage||1)-1,5), newSrs=calculateSRS(currentItem,isCorrect);
        await db.items.update(currentItem.id,{srs:newSrs}); pushToGist();
        if(currentItem.direction==='de-sv') speak(currentItem.termTarget); else speak(currentItem.termSource);
        const fb=document.getElementById('feedback-area');
        if(isCorrect){ fb.innerHTML=`<span style="color:#4caf50;">Richtig! +1</span><br><small>Lösung: ${esc(currentItem.termTarget)}</small>`; document.getElementById('check-btn').disabled=true; setTimeout(loadNextItem, 1500); }
        else { let b=variants[0], m=999; variants.forEach(v=>{let s=getLevenshtein(inp,v); if(s<m){m=s; b=v;}}); fb.innerHTML=`<span style="color:#ff4444;">Falsch. (-${curPts})</span><br>Eingabe: ${getDiffHtml(raw.trim(),b)}<br><small>Lösung: ${esc(currentItem.termTarget)}</small>`; document.getElementById('check-btn').classList.add('hidden'); document.getElementById('next-btn').classList.remove('hidden'); }
    }

    function calculateSRS(i,c){ if(!c) return {stage:1,dueDate:0}; let s=i.srs?.stage||1; const n=s+1, r=(min,max)=>Math.floor(Math.random()*(max-min+1))+min; let ms=(n===2)?r(20,50)*3600000:(n===3)?r(5,10)*86400000:(n===4)?r(12,16)*86400000:r(30,180)*86400000; return {stage:n,dueDate:Date.now()+ms}; }

    // === GEÄNDERT: Badges nutzen jetzt esc() für Tag-Namen ===
    async function loadNextItem() {
        await updateScoreDisplay(); document.getElementById('check-btn').classList.remove('hidden'); document.getElementById('next-btn').classList.add('hidden'); document.getElementById('check-btn').disabled=false; document.getElementById('user-input').value=""; document.getElementById('feedback-area').innerText="";
        let items=await db.items.toArray(); const now=Date.now();
        if(activeFilters.length>0) items=items.filter(i=>i.tags && activeFilters.some(f=>i.tags.split(',').map(x=>x.trim()).includes(f)));
        const due=items.filter(i=>(i.srs?.dueDate||0)<now); currentItem=due.length>0?due[Math.floor(Math.random()*due.length)]:null;
        if(currentItem){ const p=document.getElementById('display-prompt'); p.innerText=currentItem.termSource; p.style.fontSize=currentItem.termSource.length>25?"1.1rem":currentItem.termSource.length>15?"1.4rem":"1.8rem"; document.getElementById('display-badges').innerHTML=(currentItem.tags||"").split(',').map(t=>`<span class="badge bg-grammar">${esc(t.trim())}</span>`).join(''); document.getElementById('direction-label').innerHTML=getProgressIcon(currentItem.srs?.stage||1)+(currentItem.direction==='de-sv'?" DE ➔ SV":" SV ➔ DE"); }
        else { const has=(await db.items.count()) > 0; document.getElementById('display-prompt').innerText=has?(activeFilters.length>0?"Filter aktiv!":"Pause! 🎉"):"Bitte Cloud-Sync nutzen!"; document.getElementById('display-badges').innerHTML=""; document.getElementById('direction-label').innerHTML=""; }
    }

    function toggleView() { 
        const isNowAdmin = document.getElementById('add-view').classList.toggle('hidden'); 
        document.getElementById('learn-view').classList.toggle('hidden', !isNowAdmin); document.getElementById('input-controls').classList.toggle('hidden', !isNowAdmin);
        document.getElementById('viewBtn').innerText = isNowAdmin ? "Verwalten" : "Lernen";
        if(!isNowAdmin) renderList(); else loadNextItem();
    }

    // === GEÄNDERT: Vokabelliste nutzt jetzt esc() für alle Nutzerdaten ===
    async function renderList() {
        const q=document.getElementById('search-input').value.toLowerCase(); let items=await db.items.toArray(); if(q) items=items.filter(i=>i.termSource.toLowerCase().includes(q)||i.termTarget.toLowerCase().includes(q)||(i.tags&&i.tags.toLowerCase().includes(q)));
        document.getElementById('vocab-list').innerHTML=items.map(i=>{ if(inlineEditingId===i.id) return `<div class="vocab-item inline-edit-box"><input type="text" id="edit-src-${i.id}" value="${esc(i.termSource)}"><input type="text" id="edit-trg-${i.id}" value="${esc(i.termTarget)}"><input type="text" id="edit-tags-${i.id}" value="${esc(i.tags||'')}"><div style="display:flex;gap:5px"><button class="action-btn" style="background:#4caf50;padding:5px" onclick="saveInline(${i.id})">OK</button><button class="action-btn" style="background:#666;padding:5px" onclick="inlineEditingId=null;renderList()">X</button></div></div>`; return `<div class="vocab-item" style="display:flex;justify-content:space-between;align-items:center;"><div><div>${getProgressIcon(i.srs?.stage||1)} <strong>${esc(i.termSource)}</strong></div><div style="font-size:0.85rem;opacity:0.8">${esc(i.termTarget)}</div></div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:0.75rem">${Math.min((i.srs?.stage||1)-1, 5)}</span><button class="list-btn" onclick="inlineEditingId=${i.id};renderList()">✎</button><button class="list-btn" style="color:#ff4444" onclick="deleteVocab(${i.id})">✕</button></div></div>`; }).join('');
    }
    async function saveInline(id){ await db.items.update(id,{termSource:document.getElementById(`edit-src-${id}`).value,termTarget:document.getElementById(`edit-trg-${id}`).value,tags:document.getElementById(`edit-tags-${id}`).value}); inlineEditingId=null; pushToGist(); renderList(); updateScoreDisplay(); }
    async function deleteVocab(id){ if(confirm("Löschen?")){ await db.items.delete(id); pushToGist(); renderList(); updateScoreDisplay(); } }
    async function addVocab() { const sv=document.getElementById('input-sv').value.trim(), de=document.getElementById('input-de').value.trim(), tags=document.getElementById('input-tags').value.trim(); if(!sv||!de) return; await db.items.bulkAdd([{termSource:de,termTarget:sv,direction:'de-sv',tags,srs:{stage:1,dueDate:0}},{termSource:sv,termTarget:de,direction:'sv-de',tags,srs:{stage:1,dueDate:0}}]); document.getElementById('input-sv').value=""; document.getElementById('input-de').value=""; pushToGist(); renderList(); loadNextItem(); }

    async function syncFromGist() {
        const t = document.getElementById('github-token').value || localStorage.getItem('github_token'); 
        if(t) localStorage.setItem('github_token', t.trim());
        if(!t) { alert("Token benötigt!"); return; }
        
        setSyncStatus('syncing');
        try { 
            const res = await fetch(`https://api.github.com/gists/${GIST_ID.trim()}`, { headers: { 'Authorization': `token ${t.trim()}` } });
            
            if (!res.ok) {
                if (res.status === 401 || res.status === 403) throw new Error("Token ungültig oder keine Gist-Berechtigung.");
                if (res.status === 404) throw new Error("Gist-ID nicht gefunden.");
                throw new Error(`Fehler ${res.status}`);
            }

            const gistData = await res.json();
            if (!gistData.files['vokabeln.json']) throw new Error("Datei 'vokabeln.json' im Gist nicht gefunden.");
            
            const file = gistData.files['vokabeln.json'];
            let content;
            if (file.truncated) {
                // Datei ist zu groß für die Gist-API → vollständige Datei separat laden
                // raw_url enthält bereits einen Zugangstoken, kein Auth-Header nötig
                const rawRes = await fetch(file.raw_url);
                if (!rawRes.ok) throw new Error("Vollständige Datei konnte nicht geladen werden (Status " + rawRes.status + ").");
                content = await rawRes.text();
            } else {
                content = file.content;
            }
            const data = JSON.parse(content);
            if (data && Array.isArray(data)) { 
                await db.items.clear(); await db.items.bulkAdd(data); 
                setSyncStatus('success'); alert("Import erfolgreich!"); location.reload(); 
            } 
        } catch (e) { 
            setSyncStatus('error'); alert("Fehler: " + e.message); 
            loadNextItem(); 
        }
    }

    async function pushToGist() {
        const t = localStorage.getItem('github_token'); if (!t) {checkTokenState();return;} setSyncStatus('syncing');
        const all = await db.items.toArray();
        try { const res = await fetch(`https://api.github.com/gists/${GIST_ID.trim()}`, { method: 'PATCH', headers: { 'Authorization': `token ${t.trim()}`,'Content-Type':'application/json' }, body: JSON.stringify({ files: { 'vokabeln.json': { content: JSON.stringify(all, null, 2) } } }) }); if (res.ok) setSyncStatus('success'); else setSyncStatus('error'); }
        catch (e) { setSyncStatus('error'); }
    }

    function exportData(){ db.items.toArray().then(i=>{ const b=new Blob([JSON.stringify(i)],{type:'application/json'}), a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='backup.json'; a.click(); }); }
    function importData(e){ const r = new FileReader(); r.onload=async(ev)=>{ const d=JSON.parse(ev.target.result); await db.items.bulkAdd(d); pushToGist(); renderList(); loadNextItem(); }; r.readAsText(e.target.files[0]); }
    function toggleTheme(){ const d = document.body.classList.toggle('dark-mode'); localStorage.setItem('theme',d?'dark':'light'); document.getElementById('theme-toggle').innerText=d?'☀️':'🌙'; }
    function getProgressIcon(s=1){ const c=['#ff4444','#ff9800','#ffeb3b','#90EE90','#006400']; const count=Math.min(Math.max(s-1,0),5); let svg=`<svg width="16" height="8" viewBox="0 0 7.5 4" style="margin-right:6px">`; for(let i=0;i<5;i++) svg+=`<rect x="${i*1.5}" y="${4-(i+1)*0.8}" width="1" height="${(i+1)*0.8}" fill="${i<count?c[i]:'#444'}"/>`; return svg+`</svg>`; }

    if(localStorage.getItem('theme')==='dark') { document.body.classList.add('dark-mode'); document.getElementById('theme-toggle').innerText='☀️'; }
    document.getElementById('github-token').value=localStorage.getItem('github_token')||""; checkTokenState();
    db.items.count().then(c=>{ if(c===0 && localStorage.getItem('github_token')) syncFromGist(); else loadNextItem(); });
</script>
</body>
</html>
